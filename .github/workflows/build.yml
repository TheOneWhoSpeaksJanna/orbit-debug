name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Ensure Git LFS objects pulled
      run: git lfs pull || git lfs fetch --all && git lfs checkout

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Android SDK
      id: cache-android-sdk
      uses: actions/cache@v4
      with:
        path: |
          $ANDROID_HOME/platforms/android-36
          $ANDROID_HOME/build-tools/36.0.0
        key: android-sdk-36-${{ runner.os }}

    - name: Install Android SDK components
      if: steps.cache-android-sdk.outputs.cache-hit != 'true'
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: ${{ github.event_name != 'push' }}

    - name: Build debug APKs (all flavors) + run tests
      run: ./gradlew assembleDebug testNormalDebugUnitTest --no-daemon --parallel

    - name: Collect APKs
      run: |
        mkdir -p release
        for apk in app/build/outputs/apk/*/debug/*.apk; do
          flavor=$(basename "$(dirname "$(dirname "$apk")")")
          cp "$apk" "release/orbit-ai-${flavor}-debug-${{ github.run_number }}.apk"
        done
        if [ ! "$(ls -A release 2>/dev/null)" ]; then
          cp app/build/outputs/apk/debug/*.apk release/ 2>/dev/null || true
        fi
        ls -la release/

    - name: Upload APK artifacts
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: orbit-ai-apks-${{ github.run_number }}
        path: release/*.apk
        retention-days: 30

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Orbit AI v${{ github.run_number }}
        files: release/*.apk
